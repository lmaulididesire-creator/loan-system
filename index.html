<!DOCTYPE html>
<html>
<head>
  <title>Loan Request System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>💰 Loan Request Form</h2>

<input id="name" placeholder="Full Name"><br>
<input id="phone" placeholder="Phone Number"><br>
<input id="amount" type="number" placeholder="Amount (MK)"><br>
<input id="duration" type="number" placeholder="Weeks"><br>
<input id="date" type="date"><br>

<button onclick="calculate()">Check Loan</button>

<p id="result"></p>

<button onclick="send()">Submit Request</button>

<script src="script.js"></script>

</body>
</html>
